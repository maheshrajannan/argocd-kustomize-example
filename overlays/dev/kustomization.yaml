apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# DEV overlay: small, cheap, fast iteration.
namespace: hello-dev
namePrefix: dev-

resources:
  - ../../base

labels:
  - pairs:
      env: dev

# Patch ONLY what differs from base. No copy-paste of the Deployment.
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hello-web
      spec:
        replicas: 1
    target:
      kind: Deployment
      name: hello-web
